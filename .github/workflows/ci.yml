name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_only:
        description: "Skip lint/test and deploy directly"
        required: false
        default: "false"

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE_API: ${{ secrets.DOCKERHUB_USERNAME }}/petalia-geospatial-engine-api
  DOCKERHUB_IMAGE_WORKER: ${{ secrets.DOCKERHUB_USERNAME }}/petalia-geospatial-engine-worker

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint & type check
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Test suite (unit + api, no live GEE)
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: petalia_geo_test
          POSTGRES_USER: petalia
          POSTGRES_PASSWORD: petalia_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U petalia -d petalia_geo_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DEBUG: "false"
      SECRET_KEY: test-secret-key-for-ci-only-32-chars
      API_KEY_VALUE: ci-test-api-key-value-placeholder
      DATABASE_URL: postgresql+asyncpg://petalia:petalia_pass@localhost:5432/petalia_geo_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      GEE_SERVICE_ACCOUNT: test@test.iam.gserviceaccount.com
      GEE_PRIVATE_KEY_PATH: /tmp/gee_test.json
      GEE_PROJECT_ID: test-project

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/unit/ tests/workers/ tests/api/ -v --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Build & push to Docker Hub  (main branch only)
# ─────────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag strategy: sha-<short> on every push, "latest" always points to HEAD of main
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE_API }}
            ${{ env.DOCKERHUB_IMAGE_WORKER }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE_API }}:latest
            ${{ env.DOCKERHUB_IMAGE_API }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build & push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE_WORKER }}:latest
            ${{ env.DOCKERHUB_IMAGE_WORKER }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Deploy to AWS EC2  (main branch only, after successful push)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Ensure Docker is installed on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            if command -v docker &>/dev/null; then
              echo "==> Docker already installed: $(docker --version)"
              sudo systemctl start docker 2>/dev/null || true
            else
              echo "==> Installing Docker"
              if command -v apt-get &>/dev/null; then
                sudo apt-get update -y -qq
                sudo apt-get install -y -qq ca-certificates curl gnupg
                sudo install -m 0755 -d /etc/apt/keyrings
                curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
                  | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
                echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                  https://download.docker.com/linux/ubuntu \
                  $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
                  | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
                sudo apt-get update -y -qq
                sudo apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-compose-plugin
              else
                # Amazon Linux 2023
                sudo dnf install -y docker docker-compose-plugin
              fi
              sudo systemctl enable --now docker
              sudo usermod -aG docker "$USER" || true
              echo "==> Docker installed: $(docker --version)"
            fi

            # Ensure compose plugin is available (idempotent)
            if ! docker compose version &>/dev/null; then
              echo "==> Installing docker-compose-plugin"
              if command -v apt-get &>/dev/null; then
                sudo apt-get install -y -qq docker-compose-plugin
              else
                sudo dnf install -y docker-compose-plugin
              fi
            fi

            sudo mkdir -p /opt/petalia/secrets
            sudo chmod 755 /opt/petalia/secrets
            sudo chown "$USER":"$USER" /opt/petalia /opt/petalia/secrets

      - name: Write .env.production on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ENV_PRODUCTION
          script: |
            printf '%s' "$ENV_PRODUCTION" > /opt/petalia/.env.production
            chmod 600 /opt/petalia/.env.production

      - name: Write GEE service account key on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          GEE_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GEE_KEY
          script: |
            printf '%s' "$GEE_KEY" > /opt/petalia/secrets/gee_service_account.json
            chmod 644 /opt/petalia/secrets/gee_service_account.json

      - name: Copy compose file & env to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,docker/prometheus.yml"
          target: "/opt/petalia"
          overwrite: true

      - name: Pull images & restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/petalia

            COMPOSE="docker compose --env-file /opt/petalia/.env.production -f docker-compose.prod.yml"

            export IMAGE_TAG=sha-${{ github.sha }}
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            echo "==> Pulling new images"
            $COMPOSE pull api worker

            echo "==> Starting infrastructure services"
            $COMPOSE up -d postgres redis

            echo "==> Waiting for postgres to be healthy (up to 120s)"
            timeout 120 bash -c \
              'until docker inspect --format="{{.State.Health.Status}}" petalia_postgres 2>/dev/null | grep -q "^healthy$"; do sleep 3; done'

            echo "==> Ensuring database and PostGIS extensions exist"
            PG_USER=$(docker exec petalia_postgres printenv POSTGRES_USER)
            PG_DB=$(docker exec petalia_postgres printenv POSTGRES_DB)
            docker exec petalia_postgres psql -U "$PG_USER" -d postgres -tc \
              "SELECT 1 FROM pg_database WHERE datname = '$PG_DB'" \
              | grep -q 1 || \
              docker exec petalia_postgres psql -U "$PG_USER" -d postgres -c "CREATE DATABASE \"$PG_DB\";"
            docker exec petalia_postgres psql -U "$PG_USER" -d "$PG_DB" -c \
              "CREATE EXTENSION IF NOT EXISTS postgis;
               CREATE EXTENSION IF NOT EXISTS postgis_topology;"

            echo "==> Running migrations"
            $COMPOSE run --rm api alembic upgrade head

            echo "==> Restarting app services"
            $COMPOSE up -d --no-deps api worker flower

            echo "==> Pruning old images"
            docker image prune -f

            echo "==> Health check"
            sleep 10
            curl -sf http://localhost:8000/health || ($COMPOSE logs api && exit 1)
