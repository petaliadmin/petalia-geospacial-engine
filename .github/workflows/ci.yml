name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE_API: ${{ secrets.DOCKERHUB_USERNAME }}/petalia-geospatial-engine-api
  DOCKERHUB_IMAGE_WORKER: ${{ secrets.DOCKERHUB_USERNAME }}/petalia-geospatial-engine-worker

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint & type check
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Test suite (unit + api, no live GEE)
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: petalia_geo_test
          POSTGRES_USER: petalia
          POSTGRES_PASSWORD: petalia_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DEBUG: "false"
      SECRET_KEY: test-secret-key-for-ci-only-32-chars
      API_KEY_VALUE: ci-test-api-key-value-placeholder
      DATABASE_URL: postgresql+asyncpg://petalia:petalia_pass@localhost:5432/petalia_geo_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      GEE_SERVICE_ACCOUNT: test@test.iam.gserviceaccount.com
      GEE_PRIVATE_KEY_PATH: /tmp/gee_test.json
      GEE_PROJECT_ID: test-project

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/unit/ tests/workers/ tests/api/ -v --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Build & push to Docker Hub  (main branch only)
# ─────────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag strategy: sha-<short> on every push, "latest" always points to HEAD of main
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE_API }}
            ${{ env.DOCKERHUB_IMAGE_WORKER }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE_API }}:latest
            ${{ env.DOCKERHUB_IMAGE_API }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build & push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE_WORKER }}:latest
            ${{ env.DOCKERHUB_IMAGE_WORKER }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Deploy to AWS EC2  (main branch only, after successful push)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,.env.production"
          target: "/opt/petalia"
          overwrite: true

      - name: Pull images & restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/petalia

            # Inject image tag so compose uses the exact SHA just pushed
            export IMAGE_TAG=sha-${{ github.sha }}
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            echo "==> Pulling new images"
            docker compose -f docker-compose.prod.yml pull api worker

            echo "==> Running migrations"
            docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head

            echo "==> Restarting services"
            docker compose -f docker-compose.prod.yml up -d --no-deps api worker

            echo "==> Pruning old images"
            docker image prune -f

            echo "==> Health check"
            sleep 10
            curl -sf http://localhost:8000/health || (docker compose -f docker-compose.prod.yml logs api && exit 1)
