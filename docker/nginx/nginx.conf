upstream petalia_api {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;

    location /health {
        proxy_pass http://petalia_api/health;
        access_log off;
    }

    location /metrics {
        # Restrict Prometheus scraping to internal network only
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://petalia_api/metrics;
    }

    location / {
        proxy_pass http://petalia_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
